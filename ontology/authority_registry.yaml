# SD Authority Registry — P2 v0
# Built: 2026-06-16
#
# PURPOSE: make explicit which source is canonical for each SD topic.
# This converts dedup from runtime judgment (Skill 6) to design-time lookup.
#
# GOVERNANCE: this is a PROPOSAL for user review.
# Do NOT auto-apply to chunk dedup until the user validates this registry.
# Do NOT mutate existing chunks based on this registry in this pass.
#
# FIELD SEMANTICS:
#   authoritative_source(s):  PDF(s) whose content is primary for this topic.
#   authoritative_chunks:     chunk IDs that carry the authoritative content.
#   supplementary_sources:    PDFs that add depth/context but defer to the authority.
#   supplementary_chunks:     chunk IDs that are supplementary for this topic.
#   conflict: true            same topic has irreconcilable token differences across sources.
#   resolution_note:          how the conflict was or should be resolved.
#   notes:                    structural observations from P2 analysis.

