      - configuration-delivery-process-customizing-001 # S4610 — delivery facet
      - configuration-billing-copying-control-001      # S4615 — billing facet
    supplementary_sources:
      - file: "S4650_EN_Col17 Cross-Functional Topics in SAP S4HANA Sales.pdf"
        reason: >
          Unit 2 (Modifying Copy Control) provides a UNIFIED VIEW across all three
          document chains. Supplementary to the three authoritative facet chunks;
          does not supersede them. When chunked: mark role=secondary, note=unified view.
    supplementary_chunks:
      - configuration-billing-data-flow-001           # medium: data flow via copy control
      - order-management-sales-document-data-flow-001 # medium: user-facing document flow
    conflict: false
    notes: >
      P2 STRUCTURAL FINDING: copy control is a single coherent concept that the current
      chunk architecture has fragmented across 3 domain-specific chunks (sales/delivery/
      billing areas). This is not an error — each chunk is correct in its domain — but a
      consultant querying 'copy control' will get 3 partial answers instead of 1 unified one.
      Consider adding a cross-reference note to each of the 3 chunks pointing to the others,
      or creating a unified xfunc.copy overview chunk in a future pass.
      S4650 Unit 2 can serve as the source for that unified chunk.

