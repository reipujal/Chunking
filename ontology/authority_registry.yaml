  - topic_id: o2c.order.special
    label: "Special Order Types (Cash Sale, Rush Order, Consignment, FoC, Returns)"
    authority_pattern: distributed
    authoritative_sources:
      - file: "S4605_EN_Col17 Sales Processes in SAP S4HANA Sales.pdf"
        facet: "Special business transactions — process and document type config"
      - file: "S4615_EN_Col17 Billing in SAP S4HANA Sales.pdf"
        facet: "Billing types for special processes (CS billing type for cash sale)"
    authoritative_chunks:
      - special-processes-sales-special-business-transactions-001   # S4605 primary
      - special-processes-cash-sales-process-001                     # S4615 primary
    supplementary_sources: []
    supplementary_chunks:
      - order-management-presales-additional-processes-001   # covers MTO at medium confidence
    conflict: true
    conflict_details:
      topic: "Cash sale document type tokens"
      s4605_says: "Delivery type BV, billing type BV for cash sale"
      s4615_says: "Order type CS, billing type CS for cash sale (cancellation: SV)"
      resolution: >
        NOT a factual contradiction: BV is the delivery document type; CS is both the
        sales order type AND the billing document type. The two courses emphasize different
        documents in the same process. Chunk special-processes-cash-sales-process-001
        documents this in its 'Source and Version Notes' section. Resolution rule:
        verify actual document type configuration in the target system before relying
        on a specific token. Type A source (S4615) is more detailed for billing;
        S4605 for sales/delivery. Do NOT alter either chunk — the note in the chunk body
        is the correct artifact for this conflict.
    notes: >
      CS/BV conflict: formally registered. The resolution is system-specific;
      the registry records the divergence and defers to the target system.

